{% extends 'learning/base.html' %}
{% block content %}

<style>
    .form-page { background: #f4f6fb; min-height: 100vh; padding-bottom: 40px; }

    .form-header {
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        padding: 28px 40px; color: white; margin-bottom: 28px;
    }
    .form-header h4 { font-size: 22px; font-weight: 800; margin: 0 0 4px; }
    .form-header p  { margin: 0; opacity: 0.85; font-size: 14px; }

    .form-wrapper { max-width: 680px; margin: 0 auto; padding: 0 20px; }

    .form-card { background: white; border-radius: 20px; box-shadow: 0 4px 18px rgba(0,0,0,0.08); overflow: hidden; }
    .form-card-body { padding: 32px; }

    .field-group { margin-bottom: 22px; }
    .field-group label {
        display: block; font-weight: 700; font-size: 13px;
        text-transform: uppercase; letter-spacing: 0.5px;
        color: #374151; margin-bottom: 8px;
    }

    .field-group select,
    .field-group input[type="text"],
    .field-group input[type="datetime-local"],
    .field-group textarea {
        width: 100%; padding: 12px 16px;
        border: 2px solid #e5e7eb; border-radius: 12px;
        font-size: 14px; background: #f9fafb; color: #111827;
        transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit;
    }

    .field-group select:focus,
    .field-group input:focus,
    .field-group textarea:focus {
        outline: none; border-color: #3b82f6;
        box-shadow: 0 0 0 4px rgba(59,130,246,0.1); background: white;
    }

    .field-group textarea { resize: vertical; min-height: 100px; }

    .field-group input[type="file"] {
        width: 100%; padding: 12px 14px; border: 2px dashed #cbd5e1;
        border-radius: 12px; background: #f8fafc; font-size: 14px;
        cursor: pointer; transition: border-color 0.2s;
    }
    .field-group input[type="file"]:hover { border-color: #3b82f6; background: #eff6ff; }

    .field-hint { font-size: 12px; color: #9ca3af; margin-top: 5px; }
    .divider { border: none; border-top: 2px dashed #e5e7eb; margin: 24px 0; }

    .btn-save {
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: white; border: none; padding: 13px 28px;
        border-radius: 12px; font-weight: 700; font-size: 15px;
        cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(30,64,175,0.35); }

    .btn-back {
        background: #f3f4f6; color: #374151; border: none;
        padding: 13px 22px; border-radius: 12px; font-weight: 600;
        font-size: 15px; text-decoration: none; display: inline-block; transition: background 0.2s;
    }
    .btn-back:hover { background: #e5e7eb; color: #111; }

    @media (max-width: 640px) { .form-header { padding: 20px 16px; } }
</style>

<div class="form-page">
    <div class="form-header">
        <h4>📝 Tambah Tugas Baru</h4>
        <p>Isi detail tugas yang akan diberikan kepada siswa</p>
    </div>

    <div class="form-wrapper">
        <div class="form-card">
            <div class="form-card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="field-group">
                        <label>📚 Pilih Bab</label>
                        <select name="bab" required>
                            <option value="">-- Pilih Bab --</option>
                            {% for bab in bab_list %}
                                <option value="{{ bab.id }}" {% if bab_obj and bab_obj.id == bab.id %}selected{% endif %}>
                                    {{ bab.judul }} — {{ bab.mapel.nama }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <hr class="divider">

                    <div class="field-group">
                        <label>✏️ Judul Tugas</label>
                        <input type="text" name="judul" placeholder="Contoh: Latihan Soal Bab 1" required>
                    </div>

                    <div class="field-group">
                        <label>📄 Deskripsi / Instruksi</label>
                        <textarea name="deskripsi" placeholder="Jelaskan instruksi tugas secara detail..."></textarea>
                    </div>

                    <div class="field-group">
                        <label>📎 File Lampiran <span style="color:#9ca3af;font-weight:400;">(opsional)</span></label>
                        <input type="file" name="file_tugas">
                        <p class="field-hint">Format: PDF, DOC, DOCX, PPT, ZIP, JPG, PNG</p>
                    </div>

                    <div class="field-group">
                        <label>⏰ Deadline <span style="color:#9ca3af;font-weight:400;">(opsional)</span></label>
                        <input type="datetime-local" name="deadline">
                    </div>

                    <hr class="divider">

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="javascript:history.back()" class="btn-back">← Kembali</a>
                        <button type="submit" class="btn-save">💾 Simpan Tugas</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
